services:
  db:
    image: postgres:16-alpine
    container_name: icecream_db
    environment:
      POSTGRES_DB: icecream
      POSTGRES_USER: icecream_user
      POSTGRES_PASSWORD: icecream_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build: .
    container_name: icecream_api
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: icecream
      DB_USER: icecream_user
      DB_PASSWORD: icecream_password
      JWT_SECRET: "change_me_in_prod"
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db_data:
