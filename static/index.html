<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ice Cream Tracker</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="badge">Ice Cream Tracker</div>
        <h1>Счётчик калорийности мороженного</h1>
        <p>
          Мини‑интерфейс для регистрации, входа и добавления мороженного.
          Бэкенд считает калории, БЖУ и сахар.
        </p>
      </header>

      <main class="grid">
        <section class="card">
          <h2>Регистрация</h2>
          <form id="register-form">
            <input name="name" placeholder="Имя" required />
            <input name="email" type="email" placeholder="Email" required />
            <input
              name="password"
              type="password"
              placeholder="Пароль"
              required
            />
            <input name="weight" type="number" step="0.1" placeholder="Вес (кг)" />
            <input
              name="height"
              type="number"
              step="0.1"
              placeholder="Рост (см)"
            />
            <input name="age" type="number" placeholder="Возраст" />
            <input name="sex" placeholder="Пол (m/f)" />
            <input name="region" placeholder="Регион" />
            <button type="submit">Создать аккаунт</button>
          </form>
        </section>

        <section class="card">
          <h2>Вход</h2>
          <form id="login-form">
            <input name="email" type="email" placeholder="Email" required />
            <input
              name="password"
              type="password"
              placeholder="Пароль"
              required
            />
            <button type="submit">Войти</button>
          </form>
          <div class="token">
            <label>Токен:</label>
            <textarea id="token" rows="3" readonly></textarea>
          </div>
        </section>

        <section class="card">
          <h2>Добавить мороженное</h2>
          <form id="ice-cream-form">
            <input name="name" placeholder="Название" required />
            <input name="calories" type="number" step="0.1" placeholder="Ккал/100г" required />
            <input
              name="carbohydrates"
              type="number"
              step="0.1"
              placeholder="Углеводы/100г"
              required
            />
            <input name="proteins" type="number" step="0.1" placeholder="Белки/100г" required />
            <input name="fats" type="number" step="0.1" placeholder="Жиры/100г" required />
            <input name="sugar" type="number" step="0.1" placeholder="Сахар/100г" required />
            <input name="rysk" type="number" placeholder="Риск (1-5)" required />
            <button type="submit">Добавить</button>
          </form>
        </section>

        <section class="card">
          <h2>Что ел сегодня</h2>
          <form id="entry-form">
            <input name="ice_cream_id" type="number" placeholder="ID мороженного" required />
            <input name="eaten_date" type="date" required />
            <input name="amount_grams" type="number" step="1" placeholder="Граммы" required />
            <button type="submit">Сохранить</button>
          </form>
          <button id="load-entries">Показать мой список</button>
          <div id="entries"></div>
        </section>
      </main>

      <footer class="footer">
        <span>API: /docs</span>
        <span>Health: /health</span>
      </footer>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
